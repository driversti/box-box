<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australian Grand Prix 2026 — Overtake Analysis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:1rem}
h1{font-size:1.5rem;margin-bottom:1rem;text-align:center}
h2{font-size:1.1rem;margin:1.5rem 0 .8rem;color:#00d4ff}
a{color:#00d4ff;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1rem;font-size:.9rem}

.bar-row{display:flex;align-items:center;margin:.3rem 0}
.bar-label{width:50px;text-align:right;margin-right:.8rem;font-weight:600;font-size:.85rem}
.bar-track{flex:1;background:#2a2a4a;border-radius:4px;height:24px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:.8rem;font-weight:600;color:#000;min-width:24px}
.king{{background:#16213e;border-radius:12px;padding:1.5rem;text-align:center;margin:1rem 0;border:2px solid #FFD700}}
.king .emoji{{font-size:3rem}}
.king .name{{font-size:1.5rem;font-weight:700;margin:.5rem 0}}
.stats{{display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0}}
.stat{{background:#16213e;border-radius:8px;padding:1rem;text-align:center;flex:1;min-width:120px}}
.stat .val{{font-size:1.8rem;font-weight:700;color:#00d4ff}}
.stat .label{{font-size:.75rem;color:#888;margin-top:.3rem}}

</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<h1>🇦🇺 Australian Grand Prix 2026 — Overtake Analysis</h1>
<div id="app"></div>
<script>
const DRIVERS={"1":{"tla":"NOR","team":"McLaren","color":"#FF8000"},"3":{"tla":"VER","team":"Red Bull","color":"#4781D7"},"5":{"tla":"BOR","team":"Audi","color":"#F50537"},"6":{"tla":"HAD","team":"Red Bull","color":"#4781D7"},"10":{"tla":"GAS","team":"Alpine","color":"#00A1E8"},"11":{"tla":"PER","team":"Cadillac","color":"#909090"},"12":{"tla":"ANT","team":"Mercedes","color":"#27F4D2"},"14":{"tla":"ALO","team":"Aston Martin","color":"#229971"},"16":{"tla":"LEC","team":"Ferrari","color":"#ED1131"},"18":{"tla":"STR","team":"Aston Martin","color":"#229971"},"23":{"tla":"ALB","team":"Williams","color":"#1868DB"},"27":{"tla":"HUL","team":"Audi","color":"#F50537"},"30":{"tla":"LAW","team":"RB","color":"#6C98FF"},"31":{"tla":"OCO","team":"Haas","color":"#9C9FA2"},"41":{"tla":"LIN","team":"RB","color":"#6C98FF"},"43":{"tla":"COL","team":"Alpine","color":"#00A1E8"},"44":{"tla":"HAM","team":"Ferrari","color":"#ED1131"},"55":{"tla":"SAI","team":"Williams","color":"#1868DB"},"63":{"tla":"RUS","team":"Mercedes","color":"#27F4D2"},"77":{"tla":"BOT","team":"Cadillac","color":"#909090"},"81":{"tla":"PIA","team":"McLaren","color":"#FF8000"},"87":{"tla":"BEA","team":"Haas","color":"#9C9FA2"}};
(function(){
const DATA={"16":[{"Timestamp":"2026-03-08T04:03:36.13Z","count":2}],"6":[{"Timestamp":"2026-03-08T04:03:36.469Z","count":1}],"1":[{"Timestamp":"2026-03-08T04:03:36.668Z","count":2}],"44":[{"Timestamp":"2026-03-08T04:03:36.901Z","count":4}],"31":[{"Timestamp":"2026-03-08T04:03:37.285Z","count":7}],"12":[{"Timestamp":"2026-03-08T04:03:37.607Z","count":1}],"41":[{"Timestamp":"2026-03-08T04:03:37.922Z","count":4}],"55":[{"Timestamp":"2026-03-08T04:03:38.25Z","count":11}],"87":[{"Timestamp":"2026-03-08T04:03:38.456Z","count":3}],"10":[{"Timestamp":"2026-03-08T04:03:38.505Z","count":6}],"23":[{"Timestamp":"2026-03-08T04:03:38.926Z","count":6}],"14":[{"Timestamp":"2026-03-08T04:03:39.146Z","count":6}],"11":[{"Timestamp":"2026-03-08T04:03:39.221Z","count":6}],"43":[{"Timestamp":"2026-03-08T04:03:39.513Z","count":5}],"18":[{"Timestamp":"2026-03-08T04:03:40.081Z","count":4}],"77":[{"Timestamp":"2026-03-08T04:03:40.52Z","count":8}],"30":[{"Timestamp":"2026-03-08T04:03:41.898Z","count":1}],"5":[{"Timestamp":"2026-03-08T04:03:45.233Z","count":3}],"3":[{"Timestamp":"2026-03-08T04:03:46.604Z","count":1}],"63":[{"Timestamp":"2026-03-08T04:05:57.047Z","count":1}]};
const drivers=[];
for(const[num,entries]of Object.entries(DATA)){
  const d=DRIVERS[num];if(!d)continue;
  const total=entries.reduce((s,e)=>s+e.count,0);
  drivers.push({num,tla:d.tla,team:d.team,color:d.color,entries,total});
}
drivers.sort((a,b)=>b.total-a.total);
const totalOT=drivers.reduce((s,d)=>s+d.total,0);
const king=drivers[0];
let html='';
if(king)html+=`<div class="king"><div class="emoji">👑</div><div class="name" style="color:${king.color}">${king.tla}</div><div>${king.team} · ${king.total} overtakes</div></div>`;
html+='<div class="stats">';
html+=`<div class="stat"><div class="val">${totalOT}</div><div class="label">Total Overtakes</div></div>`;
html+=`<div class="stat"><div class="val">${(totalOT/drivers.length).toFixed(1)}</div><div class="label">Avg per Driver</div></div>`;
html+=`<div class="stat"><div class="val">${drivers.length}</div><div class="label">Drivers</div></div>`;
html+='</div>';
html+='<h2>All Drivers</h2>';
const maxT=drivers[0]?.total||1;
drivers.forEach(d=>{
  const pct=d.total/maxT*100;
  html+=`<div class="bar-row"><span class="bar-label">${d.tla}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${d.color}">${d.total}</div></div></div>`;
});
document.getElementById('app').innerHTML=html;
})();
</script>
</body>
</html>
