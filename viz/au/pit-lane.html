<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australian Grand Prix 2026 — Pit Lane</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:1rem}
h1{font-size:1.5rem;margin-bottom:1rem;text-align:center}
h2{font-size:1.1rem;margin:1.5rem 0 .8rem;color:#00d4ff}
a{color:#00d4ff;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1rem;font-size:.9rem}

.fastest{background:#16213e;border-radius:12px;padding:1.5rem;text-align:center;margin:1rem 0}
.fastest .val{font-size:2rem;font-weight:700;color:#FFD700}
.bar-row{display:flex;align-items:center;margin:.3rem 0}
.bar-label{width:50px;text-align:right;margin-right:.8rem;font-weight:600;font-size:.85rem}
.bar-track{flex:1;background:#2a2a4a;border-radius:4px;height:24px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:.8rem;font-weight:600;color:#000}

</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<h1>🇦🇺 Australian Grand Prix 2026 — Pit Lane</h1>
<div id="app"></div>
<script>
const DRIVERS={"1":{"tla":"NOR","team":"McLaren","color":"#FF8000"},"3":{"tla":"VER","team":"Red Bull","color":"#4781D7"},"5":{"tla":"BOR","team":"Audi","color":"#F50537"},"6":{"tla":"HAD","team":"Red Bull","color":"#4781D7"},"10":{"tla":"GAS","team":"Alpine","color":"#00A1E8"},"11":{"tla":"PER","team":"Cadillac","color":"#909090"},"12":{"tla":"ANT","team":"Mercedes","color":"#27F4D2"},"14":{"tla":"ALO","team":"Aston Martin","color":"#229971"},"16":{"tla":"LEC","team":"Ferrari","color":"#ED1131"},"18":{"tla":"STR","team":"Aston Martin","color":"#229971"},"23":{"tla":"ALB","team":"Williams","color":"#1868DB"},"27":{"tla":"HUL","team":"Audi","color":"#F50537"},"30":{"tla":"LAW","team":"RB","color":"#6C98FF"},"31":{"tla":"OCO","team":"Haas","color":"#9C9FA2"},"41":{"tla":"LIN","team":"RB","color":"#6C98FF"},"43":{"tla":"COL","team":"Alpine","color":"#00A1E8"},"44":{"tla":"HAM","team":"Ferrari","color":"#ED1131"},"55":{"tla":"SAI","team":"Williams","color":"#1868DB"},"63":{"tla":"RUS","team":"Mercedes","color":"#27F4D2"},"77":{"tla":"BOT","team":"Cadillac","color":"#909090"},"81":{"tla":"PIA","team":"McLaren","color":"#FF8000"},"87":{"tla":"BEA","team":"Haas","color":"#9C9FA2"}};
(function(){
const DATA={"43":[{"duration":"27.7","lap":"9"},{"duration":"18.5","lap":"46"}],"1":[{"duration":"18.2","lap":"11"},{"duration":"17.6","lap":"34"}],"31":[{"duration":"18.5","lap":"11"}],"10":[{"duration":"18.6","lap":"11"}],"55":[{"duration":"19.8","lap":"11"},{"duration":"25.9","lap":"33"},{"duration":"34.6","lap":"45"}],"30":[{"duration":"19.1","lap":"11"},{"duration":"18.1","lap":"33"}],"14":[{"duration":"25.8","lap":"11"},{"duration":"972.3","lap":"13"}],"18":[{"duration":"36.6","lap":"11"},{"duration":"33.1","lap":"26"},{"duration":"1081.5","lap":"34"},{"duration":"22.4","lap":"39"}],"63":[{"duration":"17.7","lap":"12"}],"12":[{"duration":"20.9","lap":"12"}],"23":[{"duration":"18.1","lap":"12"},{"duration":"18.4","lap":"33"}],"77":[{"duration":"30.3","lap":"12"}],"41":[{"duration":"18.5","lap":"18"}],"3":[{"duration":"19.0","lap":"18"},{"duration":"18.0","lap":"41"}],"87":[{"duration":"18.7","lap":"18"}],"5":[{"duration":"18.9","lap":"18"},{"duration":"22.6","lap":"33"}],"11":[{"duration":"21.3","lap":"18"},{"duration":"18.9","lap":"43"}],"16":[{"duration":"17.6","lap":"25"}],"44":[{"duration":"17.7","lap":"28"}]};
const app=document.getElementById('app');
// Find fastest
let fastest=null;
const all=[];
for(const[num,entries]of Object.entries(DATA)){
  const d=DRIVERS[num];if(!d)continue;
  entries.forEach(e=>{
    const dur=parseFloat(e.duration);
    if(!isNaN(dur)){
      all.push({num,...d,duration:dur,lap:e.lap});
      if(!fastest||dur<fastest.duration)fastest={num,...d,duration:dur,lap:e.lap};
    }
  });
}
let html='';
if(fastest)html+=`<div class="fastest"><div>🏆 Fastest Pit Stop</div><div class="val" style="color:${fastest.color}">${fastest.duration}s</div><div>${fastest.tla} (${fastest.team}) · Lap ${fastest.lap}</div></div>`;
html+='<h2>All Pit Stops by Duration</h2>';
all.sort((a,b)=>a.duration-b.duration);
const maxDur=all[all.length-1]?.duration||1;
all.forEach(d=>{
  const pct=d.duration/maxDur*100;
  html+=`<div class="bar-row"><span class="bar-label">${d.tla}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${d.color}">${d.duration}s</div></div></div>`;
});
app.innerHTML=html;
})();
</script>
</body>
</html>
