<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 World Championship</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;max-width:1200px;margin:0 auto}
h1{text-align:center;font-size:2em;margin-bottom:8px}
h2{font-size:1.3em;margin:30px 0 12px;color:#fff}
.container{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.card{background:#16213e;border-radius:12px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.full{grid-column:1/-1}
canvas{width:100%;height:auto}
.leader-cards{display:flex;gap:16px;flex-wrap:wrap}
.leader-card{flex:1;min-width:200px;text-align:center;padding:20px;border-radius:12px;position:relative;overflow:hidden}
.leader-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.leader-card .label{font-size:.85em;opacity:.8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.leader-card .name{font-size:1.6em;font-weight:700;margin-bottom:2px}
.leader-card .points{font-size:3em;font-weight:800}
.stats{display:flex;gap:12px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:#16213e;border-radius:10px;padding:16px;text-align:center}
.stat .val{font-size:1.8em;font-weight:700;color:#fff}
.stat .lbl{font-size:.8em;opacity:.7;margin-top:4px}
@media(max-width:700px){.container{grid-template-columns:1fr}.leader-card .points{font-size:2em}}
</style>
</head>
<body>
<h1>🏆 F1 2026 World Championship</h1>
<div id="stats" class="stats"></div>
<div class="container">
  <div class="card full leader-cards" id="leaders"></div>
  <div class="card"><h2>Driver Standings</h2><canvas id="driverChart"></canvas></div>
  <div class="card"><h2>Constructor Standings</h2><canvas id="teamChart"></canvas></div>
  <div class="card full"><h2>Points Progression (Top 5)</h2><canvas id="progressionChart"></canvas></div>
</div>
<script>
const DATA={"Australia":{"drivers":{"RUS":25,"ANT":18,"HAD":0,"LEC":15,"PIA":0,"NOR":10,"HAM":12,"LAW":0,"LIN":4,"BOR":2,"HUL":0,"BEA":6,"OCO":0,"GAS":1,"ALB":0,"COL":0,"ALO":0,"PER":0,"BOT":0,"VER":8,"SAI":0,"STR":0},"teams":{"Mercedes":43,"Red Bull":8,"Ferrari":27,"McLaren":10,"Racing Bulls":4,"Audi":2,"Haas":6,"Alpine":1,"Williams":0,"Aston Martin":0,"Cadillac":0}},"China":{"drivers":{"RUS":33,"ANT":22,"LEC":22,"HAM":18,"NOR":15,"VER":8,"BEA":7,"LIN":4,"BOR":2,"GAS":1,"OCO":0,"ALB":0,"LAW":2,"COL":0,"SAI":0,"PER":0,"HAD":0,"PIA":3,"HUL":0,"ALO":0,"BOT":0},"teams":{"Mercedes":55,"Ferrari":40,"McLaren":18,"Red Bull":8,"Haas":7,"Racing Bulls":6,"Audi":2,"Alpine":1,"Williams":0,"Cadillac":0,"Aston Martin":0}},"Japan":{"drivers":{"RUS":63,"ANT":72,"LEC":49,"HAM":41,"BEA":17,"NOR":25,"GAS":15,"VER":12,"LAW":10,"LIN":4,"HAD":4,"PIA":21,"SAI":2,"BOR":2,"COL":1,"OCO":1,"HUL":0,"ALB":0,"BOT":0,"PER":0,"ALO":0,"STR":0},"teams":{"Mercedes":135,"Ferrari":90,"McLaren":46,"Haas":18,"Red Bull":16,"Racing Bulls":14,"Alpine":16,"Audi":2,"Williams":2,"Cadillac":0,"Aston Martin":0}}};

const TEAM_COLORS={Mercedes:"#27F4D2",Ferrari:"#ED1131",McLaren:"#FF8000","Red Bull":"#4781D7",Haas:"#9C9FA2","Racing Bulls":"#6C98FF",Audi:"#F50537",Alpine:"#00A1E8",Williams:"#1868DB","Aston Martin":"#229971",Cadillac:"#909090"};
const DRIVER_TEAM={ANT:"Mercedes",RUS:"Mercedes",LEC:"Ferrari",HAM:"Ferrari",NOR:"McLaren",PIA:"McLaren",VER:"Red Bull",HAD:"Red Bull",BEA:"Haas",LIN:"Racing Bulls",LAW:"Racing Bulls",BOR:"Audi",HUL:"Audi",GAS:"Alpine",COL:"Alpine",SAI:"Williams",ALB:"Williams",ALO:"Aston Martin",STR:"Aston Martin",PER:"Cadillac",BOT:"Cadillac"};
const RACES=["Australia","China","Japan"];

function driverColor(d){return TEAM_COLORS[DRIVER_TEAM[d]]||"#999"}
function teamColor(t){return TEAM_COLORS[t]||"#999"}

// Current standings
const lastRace=DATA[RACES[RACES.length-1]];
const driversSorted=Object.entries(lastRace.drivers).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
const teamsSorted=Object.entries(lastRace.teams).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);

// Leader cards
const leaderDriver=driversSorted[0];
const leaderTeam=teamsSorted[0];
document.getElementById('leaders').innerHTML=`
  <div class="leader-card" style="background:${driverColor(leaderDriver[0])}22;border-left:4px solid ${driverColor(leaderDriver[0])}">
    <div class="label">Drivers' Leader</div><div class="name" style="color:${driverColor(leaderDriver[0])}">${leaderDriver[0]}</div><div class="points">${leaderDriver[1]}</div>
  </div>
  <div class="leader-card" style="background:${teamColor(leaderTeam[0])}22;border-left:4px solid ${teamColor(leaderTeam[0])}">
    <div class="label">Constructors' Leader</div><div class="name" style="color:${teamColor(leaderTeam[0])}">${leaderTeam[0]}</div><div class="points">${leaderTeam[1]}</div>
  </div>`;

// Stats
const gap=driversSorted.length>=2?driversSorted[0][1]-driversSorted[1][1]:0;
let biggestJump=0,mostImproved="";
RACES.forEach((r,i)=>{if(i===0)return;Object.entries(DATA[r].drivers).forEach(([d,p])=>{
  const prev=DATA[RACES[i-1]].drivers[d]||0;const jump=p-prev;if(jump>biggestJump){biggestJump=jump;mostImproved=d}
})});
document.getElementById('stats').innerHTML=`
  <div class="stat"><div class="val">3</div><div class="lbl">Races Completed</div></div>
  <div class="stat"><div class="val" style="color:${driverColor(leaderDriver[0])}">${gap}</div><div class="lbl">Leader Gap (P1-P2)</div></div>
  <div class="stat"><div class="val" style="color:${driverColor(mostImproved)}">${mostImproved} +${biggestJump}</div><div class="lbl">Biggest Single-Race Haul</div></div>`;

// Draw bar chart
function drawBarChart(canvasId,items,colorFn){
  const canvas=document.getElementById(canvasId);
  const dpr=window.devicePixelRatio||1;
  const barH=28,gap=6,padTop=10,padBottom=10,padLeft=60,padRight=50;
  const h=padTop+items.length*(barH+gap)+padBottom;
  const w=canvas.parentElement.clientWidth-40;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const maxVal=Math.max(...items.map(i=>i[1]));
  const barArea=w-padLeft-padRight;
  items.forEach((item,i)=>{
    const y=padTop+i*(barH+gap);
    const color=colorFn(item[0]);
    // Label
    ctx.fillStyle='#ccc';ctx.font='bold 13px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(item[0],padLeft-8,y+barH/2);
    // Bar
    const bw=Math.max(2,barArea*item[1]/maxVal);
    ctx.fillStyle=color;ctx.beginPath();
    ctx.roundRect(padLeft,y,bw,barH,4);ctx.fill();
    // Value
    ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='left';
    ctx.fillText(item[1],padLeft+bw+6,y+barH/2);
  });
}

drawBarChart('driverChart',driversSorted,driverColor);
drawBarChart('teamChart',teamsSorted,teamColor);

// Progression line chart
function drawProgression(){
  const canvas=document.getElementById('progressionChart');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth-40;
  const h=320;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const padL=50,padR=20,padT=20,padB=40;
  const chartW=w-padL-padR,chartH=h-padT-padB;

  // Get top 5 drivers
  const top5=driversSorted.slice(0,5).map(d=>d[0]);
  const allPoints=top5.flatMap(d=>RACES.map(r=>DATA[r].drivers[d]||0));
  const maxP=Math.max(...allPoints)*1.1;

  // Grid
  ctx.strokeStyle='#ffffff15';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=padT+chartH*(1-i/5);
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+chartW,y);ctx.stroke();
    ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(Math.round(maxP*i/5),padL-6,y);
  }

  // X labels
  RACES.forEach((r,i)=>{
    const x=padL+chartW*i/(RACES.length-1);
    ctx.fillStyle='#888';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(r,x,h-padB+10);
  });

  // Lines
  top5.forEach(d=>{
    const color=driverColor(d);
    ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.beginPath();
    RACES.forEach((r,i)=>{
      const x=padL+chartW*i/(RACES.length-1);
      const y=padT+chartH*(1-(DATA[r].drivers[d]||0)/maxP);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Markers + labels
    RACES.forEach((r,i)=>{
      const x=padL+chartW*i/(RACES.length-1);
      const y=padT+chartH*(1-(DATA[r].drivers[d]||0)/maxP);
      ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      if(i===RACES.length-1){
        ctx.fillStyle=color;ctx.font='bold 11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillText(d+' '+(DATA[r].drivers[d]||0),x+8,y);
      }
    });
  });
}
drawProgression();

window.addEventListener('resize',()=>{
  drawBarChart('driverChart',driversSorted,driverColor);
  drawBarChart('teamChart',teamsSorted,teamColor);
  drawProgression();
});
</script>
</body>
</html>
