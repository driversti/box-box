<title>🇯🇵 Japanese Grand Prix 2026 — Lap Times</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px}
h1{text-align:center;font-size:1.5em;margin:12px 0;color:#fff}
.controls{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;max-width:1400px;margin-left:auto;margin-right:auto}
.driver-btn{border:2px solid;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:0.8em;font-weight:600;background:transparent;transition:opacity .2s}
.driver-btn.active{opacity:1}.driver-btn:not(.active){opacity:.3}
.chart-wrap{width:100%;max-width:1400px;margin:10px auto;position:relative;background:#12122a;border-radius:10px;overflow:hidden}
canvas{width:100%;display:block}
.tooltip{position:fixed;background:#222244;border:1px solid #444;border-radius:6px;padding:6px 10px;font-size:0.8em;pointer-events:none;z-index:100;display:none;white-space:nowrap}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;max-width:1400px;margin:20px auto}
.card{background:#12122a;border-radius:10px;padding:16px}
.card h2{font-size:1em;margin-bottom:10px;color:#888;text-transform:uppercase;letter-spacing:1px}
.card table{width:100%;border-collapse:collapse;font-size:0.85em}
.card th{text-align:left;color:#666;font-weight:400;padding:4px 8px;border-bottom:1px solid #333}
.card td{padding:4px 8px;border-bottom:1px solid #1a1a2e}
.color-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.pit-marker{color:#ff6}
</style>
</head>

const D=DATA;
const drivers=D.drivers;
const laps=D.lapTimes;

// Find pit lap thresholds (laps > 110s are pit/out laps)
const PIT_THRESHOLD=105;
function isPitRelated(secs){return secs>PIT_THRESHOLD}

// Build all laps per driver, dedup by lap number (take last)
const driverLaps={};
for(const[num,entries]of Object.entries(laps)){
  const map=new Map();
  for(const[lapNum,secs,pitFlag,str]of entries){
    map.set(lapNum,{lap:lapNum,secs,str,pit:pitFlag||isPitRelated(secs)});
  }
  driverLaps[num]=[...map.values()].sort((a,b)=>a.lap-b.lap);
}

// Driver buttons
const allNums=Object.keys(drivers).sort((a,b)=>drivers[a].tla.localeCompare(drivers[b].tla));
const active=new Set(allNums);
const ctrl=document.getElementById('controls');
allNums.forEach(n=>{
  const b=document.createElement('button');
  b.className='driver-btn active';
  b.style.borderColor=drivers[n].color;b.style.color=drivers[n].color;
  b.textContent=drivers[n].tla;
  b.onclick=()=>{if(active.has(n)){active.delete(n);b.classList.remove('active')}else{active.add(n);b.classList.add('active')}draw()};
  ctrl.appendChild(b);
});

// Chart
const canvas=document.getElementById('chart');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');
let dpr=window.devicePixelRatio||1;

function resize(){
  const w=canvas.parentElement.clientWidth;
  const h=Math.min(600,Math.max(400,w*0.45));
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
window.addEventListener('resize',resize);

const PAD={t:20,r:20,b:40,l:60};

function draw(){
  const W=canvas.width/dpr,H=canvas.height/dpr;
  ctx.clearRect(0,0,W,H);
  const pw=W-PAD.l-PAD.r, ph=H-PAD.t-PAD.b;

  // Find ranges
  let maxLap=0,minT=Infinity,maxT=0;
  const pts={};
  for(const n of active){
    if(!driverLaps[n])continue;
    pts[n]=[];
    for(const l of driverLaps[n]){
      if(l.secs>200)continue; // skip SC-like
      maxLap=Math.max(maxLap,l.lap);
      minT=Math.min(minT,l.secs);
      maxT=Math.max(maxT,l.secs);
      pts[n].push(l);
    }
  }
  if(minT===Infinity)return;
  minT=Math.floor(minT)-1;maxT=Math.ceil(maxT)+1;

  const x=l=>PAD.l+((l-1)/(maxLap))*pw;
  const y=s=>PAD.t+(1-(s-minT)/(maxT-minT))*ph;

  // Grid
  ctx.strokeStyle='#2a2a4a';ctx.lineWidth=1;
  ctx.font='11px sans-serif';ctx.fillStyle='#666';
  ctx.textAlign='center';
  for(let i=1;i<=maxLap;i+=5){
    const px=x(i);ctx.beginPath();ctx.moveTo(px,PAD.t);ctx.lineTo(px,H-PAD.b);ctx.stroke();
    ctx.fillText(i,px,H-PAD.b+16);
  }
  ctx.textAlign='right';
  const step=maxT-minT>10?2:1;
  for(let s=Math.ceil(minT);s<=maxT;s+=step){
    const py=y(s);ctx.beginPath();ctx.moveTo(PAD.l,py);ctx.lineTo(W-PAD.r,py);ctx.stroke();
    const m=Math.floor(s/60),sec=(s%60).toFixed(0);
    ctx.fillText(m+':'+sec.padStart(2,'0'),PAD.l-6,py+4);
  }

  // Lines
  for(const n of active){
    if(!pts[n]||!pts[n].length)continue;
    const c=drivers[n].color;
    ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.globalAlpha=0.7;
    ctx.beginPath();
    pts[n].forEach((l,i)=>{i===0?ctx.moveTo(x(l.lap),y(l.secs)):ctx.lineTo(x(l.lap),y(l.secs))});
    ctx.stroke();
    // Pit markers
    pts[n].forEach(l=>{
      if(l.pit){ctx.globalAlpha=1;ctx.fillStyle='#ffff66';ctx.beginPath();ctx.arc(x(l.lap),y(l.secs),3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.7}
    });
    ctx.globalAlpha=1;
  }

  // Store points for hover
  canvas._pts=pts;canvas._x=x;canvas._y=y;canvas._minT=minT;canvas._maxT=maxT;canvas._maxLap=maxLap;
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(!canvas._pts)return;
  let best=null,bestD=20;
  for(const n of active){
    if(!canvas._pts[n])continue;
    for(const l of canvas._pts[n]){
      const px=canvas._x(l.lap),py=canvas._y(l.secs);
      const d=Math.hypot(mx-px,my-py);
      if(d<bestD){bestD=d;best={n,l,px,py}}
    }
  }
  if(best){
    const d=drivers[best.n],l=best.l;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+12)+'px';tooltip.style.top=(e.clientY-30)+'px';
    tooltip.innerHTML=`<span class="color-dot" style="background:${d.color}"></span><b>${d.tla}</b> Lap ${l.lap}: ${l.str}${l.pit?' 🛞 PIT':''}`;
  }else tooltip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>tooltip.style.display='none');

// Fastest laps
const allFlat=[];
for(const[n,ls]of Object.entries(driverLaps)){
  for(const l of ls)if(!l.pit)allFlat.push({n,...l});
}
allFlat.sort((a,b)=>a.secs-b.secs);
const ft=document.getElementById('fastest');
allFlat.slice(0,5).forEach((l,i)=>{
  const d=drivers[l.n];
  ft.innerHTML+=`<tr><td>${i+1}</td><td><span class="color-dot" style="background:${d.color}"></span>${d.tla}</td><td>L${l.lap}</td><td>${l.str}</td></tr>`;
});

// Race pace
const paceArr=[];
for(const[n,ls]of Object.entries(driverLaps)){
  const clean=ls.filter(l=>!l.pit&&l.lap>2&&l.secs<200);
  if(clean.length)paceArr.push({n,avg:clean.reduce((s,l)=>s+l.secs,0)/clean.length});
}
paceArr.sort((a,b)=>a.avg-b.avg);
const pt=document.getElementById('pace');
paceArr.forEach((p,i)=>{
  const d=drivers[p.n];
  const m=Math.floor(p.avg/60),s=(p.avg%60).toFixed(3);
  pt.innerHTML+=`<tr><td>${i+1}</td><td><span class="color-dot" style="background:${d.color}"></span>${d.tla}</td><td>${m}:${s.padStart(6,'0')}</td></tr>`;
});

// Degradation
const degArr=[];
for(const[n,ls]of Object.entries(driverLaps)){
  const clean=ls.filter(l=>!l.pit&&l.secs<200);
  if(clean.length<20)continue;
  const sorted=[...clean].sort((a,b)=>a.lap-b.lap);
  const first10=sorted.slice(0,10),last10=sorted.slice(-10);
  const avgF=first10.reduce((s,l)=>s+l.secs,0)/10;
  const avgL=last10.reduce((s,l)=>s+l.secs,0)/10;
  degArr.push({n,delta:avgL-avgF});
}
degArr.sort((a,b)=>b.delta-a.delta);
const dt=document.getElementById('degrad');
degArr.forEach((d2,i)=>{
  const d=drivers[d2.n];
  const sign=d2.delta>=0?'+':'';
  dt.innerHTML+=`<tr><td>${i+1}</td><td><span class="color-dot" style="background:${d.color}"></span>${d.tla}</td><td style="color:${d2.delta<0?'#6f6':'#f66'}">${sign}${d2.delta.toFixed(3)}s</td></tr>`;
});

resize();
</script>
</body>
