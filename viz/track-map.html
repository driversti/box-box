function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

// Find closest track index for each car
function closestIdx(cx, cy) {
  let minD = Infinity, idx = 0;
  for (let i = 0; i < trackData.length; i++) {
    const d = (trackData[i].x - cx)**2 + (trackData[i].y - cy)**2;
    if (d < minD) { minD = d; idx = i; }
  }
  return idx;
}

}).sort((a, b) => a.idx - b.idx);

  }
  ctx.closePath();
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Cars
  sortedCars.forEach((d, i) => {
    const cx = tx(d.x), cy = ty(d.y);
    // Glow
    ctx.beginPath();
    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
    ctx.fillStyle = d.color + '40';
    ctx.fill();
    // Dot
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI * 2);
    ctx.fillStyle = d.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Label
    ctx.font = 'bold 10px system-ui';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(d.tla, cx, cy - 13);
  });
}

draw();
window.addEventListener('resize', draw);
</script>
</body>
</html>
