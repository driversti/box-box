body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px;min-height:100vh}

.container{display:flex;gap:16px;max-width:1400px;margin:0 auto;flex-wrap:wrap}
.chart-wrap{flex:1;min-width:600px;position:relative}
canvas{width:100%;background:#0f0f23;border-radius:8px;cursor:crosshair;display:block}

.legend-item:hover{border-color:#fff}
.legend-item.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.3)}
.legend-item .dot{width:10px;height:10px;border-radius:2px}
.cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.card{background:#16213e;border-radius:8px;padding:10px 16px;text-align:center;min-width:160px;border:1px solid #1a3a5c}
.card .label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:1.2em;font-weight:bold;margin-top:2px}
.event-label{position:absolute;font-size:10px;color:#ffd700;transform:rotate(-90deg);transform-origin:left bottom;pointer-events:none;opacity:.7}
</style>
</head>

  leaderChanges.forEach(lc=>{
    const x=getX(lc.lap);
    ctx.beginPath();ctx.moveTo(x,PADDING.top);ctx.lineTo(x,h-PADDING.bottom);ctx.stroke();
    ctx.fillStyle='#ffd70088';ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.save();ctx.translate(x+3,h-PADDING.bottom-4);ctx.fillText(lc.tla,0,0);ctx.restore();
  });
  ctx.setLineDash([]);

  // Hover line
  if(hoverLap){
    const x=getX(hoverLap);
    ctx.strokeStyle='#ffffff44';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,PADDING.top);ctx.lineTo(x,h-PADDING.bottom);ctx.stroke();
  }

  // Draw lines
  for(const num of driverNums){
    const d=drivers[num]||{tla:num,color:'#888'};
    const laps=Object.keys(data[num]).map(Number).sort((a,b)=>a-b);
    const isDim=selectedDriver&&selectedDriver!==num;
    ctx.strokeStyle=isDim?d.color+'33':d.color;
    ctx.lineWidth=selectedDriver===num?2.5:isDim?1:1.5;
    ctx.beginPath();
    laps.forEach((lap,i)=>{
      const x=getX(lap),y=getY(data[num][lap]);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();

    // DNF marker
    if(laps[laps.length-1]<TOTAL_LAPS){
      const lastLap=laps[laps.length-1];
      ctx.fillStyle=isDim?'#ff000033':'#ff0000';
      ctx.beginPath();ctx.arc(getX(lastLap),getY(data[num][lastLap]),3,0,Math.PI*2);ctx.fill();
    }

    // Start/end labels for selected
    if(selectedDriver===num){
      ctx.fillStyle=d.color;ctx.font='bold 11px sans-serif';ctx.textAlign='left';
      ctx.fillText(d.tla,getX(1)-4,getY(data[num][1])-6);
      ctx.fillText(d.tla,getX(laps[laps.length-1])+4,getY(data[num][laps[laps.length-1]])-6);
    }
  }
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const w=rect.width;
  const lap=Math.round((mx-PADDING.left)/(w-PADDING.left-PADDING.right)*(TOTAL_LAPS-1)+1);
  if(lap<1||lap>TOTAL_LAPS){tooltip.style.display='none';hoverLap=null;draw();return;}
  hoverLap=lap;

  // Find who was at this lap position-wise
  let items=[];
  for(const[num,d]of Object.entries(data)){
    if(d[lap])items.push({num,pos:d[lap],tla:drivers[num]?.tla||num,color:drivers[num]?.color||'#888'});
  }
  items.sort((a,b)=>a.pos-b.pos);

  let html=`<div style="margin-bottom:4px;color:#ffd700">Lap ${lap}</div>`;
  items.slice(0,5).forEach(it=>{
    html+=`<div><span style="color:${it.color};font-weight:bold">${it.tla}</span> <span class="pos">P${it.pos}</span></div>`;
  });
  if(items.length>5)html+=`<div style="color:#666;font-size:11px">...+${items.length-5} more</div>`;

  tooltip.innerHTML=html;
  tooltip.style.display='block';
  const tx=Math.min(e.clientX-rect.left+12,rect.width-160);
  const ty=Math.min(e.clientY-rect.top+12,rect.height-120);
  tooltip.style.left=tx+'px';
  tooltip.style.top=ty+'px';
  draw();
});

canvas.addEventListener('mouseleave',()=>{tooltip.style.display='none';hoverLap=null;draw();});

window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
