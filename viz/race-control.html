<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇯🇵 Japanese Grand Prix 2026 — Race Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px;max-width:1200px;margin:0 auto}
h1{text-align:center;font-size:1.6em;margin-bottom:20px;color:#fff}
h2{font-size:1.1em;margin:20px 0 10px;color:#ccc;border-bottom:1px solid #333;padding-bottom:4px}
.stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.stat{background:#16213e;border-radius:8px;padding:12px 18px;flex:1;min-width:120px;text-align:center}
.stat .num{font-size:1.8em;font-weight:700;color:#fff}
.stat .label{font-size:.75em;color:#888;margin-top:2px}
.timeline-wrap{overflow-x:auto;margin-bottom:20px;background:#16213e;border-radius:8px;padding:16px}
.timeline{position:relative;height:180px;min-width:800px}
.timeline .lap-labels{display:flex;justify-content:space-between;font-size:.65em;color:#666;padding-top:4px}
.timeline .lane{position:relative;height:28px;margin:2px 0;border-bottom:1px solid #222}
.timeline .lane-label{position:absolute;left:0;top:2px;font-size:.6em;color:#888;width:70px}
.timeline .marker{position:absolute;width:10px;height:10px;border-radius:50%;top:9px;cursor:pointer;transition:transform .15s}
.timeline .marker:hover{transform:scale(2);z-index:10}
.timeline .marker.green{background:#4caf50}
.timeline .marker.yellow{background:#ffc107}
.timeline .marker.red{background:#f44336}
.timeline .marker.blue{background:#2196f3}
.timeline .marker.penalty{background:#9c27b0}
.timeline .marker.other{background:#888}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.filters button{background:#16213e;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:16px;cursor:pointer;font-size:.8em;transition:all .15s}
.filters button.active{background:#0f3460;color:#fff;border-color:#0f3460}
.filters button:hover{background:#0f3460}
.feed{max-height:500px;overflow-y:auto;background:#16213e;border-radius:8px}
.msg{padding:10px 14px;border-bottom:1px solid #1a1a2e;display:flex;gap:10px;align-items:flex-start}
.msg:hover{background:#1a2744}
.msg .meta{min-width:130px;font-size:.75em;color:#888;flex-shrink:0}
.msg .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:600;color:#fff;margin-right:4px;white-space:nowrap}
.msg .driver{font-weight:700;color:#fff;margin-right:4px;font-size:.85em}
.msg .text{font-size:.85em;color:#ccc;flex:1}
.badge.flag{background:#4caf50}.badge.penalty{background:#9c27b0}.badge.safetycar{background:#ffc107;color:#000}.badge.drs{background:#2196f3}.badge.other{background:#555}
.penalties{background:#16213e;border-radius:8px;padding:14px;margin-top:10px}
.penalties .item{padding:8px 0;border-bottom:1px solid #222;font-size:.85em}
.penalties .item:last-child{border:none}
.penalties .item .pdriver{font-weight:700;color:#fff}
.tooltip{display:none;position:fixed;background:#0d1b3e;border:1px solid #333;padding:8px 12px;border-radius:6px;font-size:.75em;z-index:100;max-width:300px;pointer-events:none;color:#ccc}
@media(max-width:600px){.stat{min-width:90px;padding:8px}.stat .num{font-size:1.3em}.msg{flex-direction:column;gap:4px}.msg .meta{min-width:auto}}
</style>
</head>
<body>
<h1>🇯🇵 Japanese Grand Prix 2026 — Race Control</h1>
<div id="stats" class="stats"></div>
<h2>📅 Race Timeline</h2>
<div class="timeline-wrap"><div id="timeline" class="timeline"></div><div id="lap-labels" class="lap-labels"></div></div>
<div id="tooltip" class="tooltip"></div>
<h2>📋 Messages</h2>
<div id="filters" class="filters"></div>
<div id="feed" class="feed"></div>
<h2>🏁 Penalties &amp; Investigations</h2>
<div id="penalties" class="penalties"></div>
<script>

02:23:40.187{"Messages":{"37":{"Utc":"2026-03-29T06:33:57","Lap":48,"Category":"Flag","Flag":"BLUE","Scope":"Driver","RacingNumber":"77","Message":"WAVED BLUE FLAG FOR CAR 77 (BOT) TIMED AT 15:33:57"}}}
02:23:56.365{"Messages":{"38":{"Utc":"2026-03-29T06:34:13","Lap":48,"Category":"Flag","Flag":"BLUE","Scope":"Driver","RacingNumber":"77","Message":"WAVED BLUE FLAG FOR CAR 77 (BOT) TIMED AT 15:34:13"}}}

// Parse
const msgs = [];
RAW.trim().split('\n').forEach(line => {
  const braceIdx = line.indexOf('{');
  if (braceIdx < 0) return;
  const ts = line.slice(0, braceIdx).trim();
  const json = JSON.parse(line.slice(braceIdx));
  const m = json.Messages;
  if (Array.isArray(m)) {
    m.forEach((v, i) => msgs.push({id: String(i), ...v, _ts: ts}));
  } else {
    Object.entries(m).forEach(([k, v]) => msgs.push({id: k, ...v, _ts: ts}));
  }
});
msgs.sort((a, b) => a.id - b.id);

const extractDriver = s => { const m = s.match(/\b([A-Z]{2,4})\b/g); return m ? m[m.length - 1] : null; };

const categories = ['Flag','SafetyCar','Penalty','DRS','Other'];
const catColor = m => {
  if (m.Category === 'SafetyCar') return 'yellow';
  if (m.Flag === 'YELLOW' || m.Flag === 'DOUBLE YELLOW') return 'yellow';
  if (m.Flag === 'RED') return 'red';
  if (m.Flag === 'GREEN' || m.Flag === 'CLEAR' || m.Flag === 'CHEQUERED') return 'green';
  if (m.Flag === 'BLUE') return 'blue';
  if (m.Category === 'Penalty') return 'penalty';
  return 'other';
};
const catClass = c => c.toLowerCase().replace(' ','');

// Stats
const total = msgs.length;
const yellowCount = msgs.filter(m => m.Flag === 'YELLOW' || m.Flag === 'DOUBLE YELLOW' || m.Category === 'SafetyCar').length;
const scDeploy = msgs.filter(m => m.Category === 'SafetyCar' && m.Status === 'DEPLOYED').length;
const penaltyCount = msgs.filter(m => m.Category === 'Penalty').length;
const drsCount = msgs.filter(m => m.Category === 'DRS').length;

document.getElementById('stats').innerHTML = `
<div class="stat"><div class="num">${total}</div><div class="label">Total Messages</div></div>
<div class="stat"><div class="num" style="color:#ffc107">${yellowCount}</div><div class="label">Yellow / SC Events</div></div>
<div class="stat"><div class="num" style="color:#ffc107">${scDeploy}</div><div class="label">Safety Car</div></div>
<div class="stat"><div class="num" style="color:#9c27b0">${penaltyCount}</div><div class="label">Penalties</div></div>
<div class="stat"><div class="num" style="color:#2196f3">${drsCount}</div><div class="label">DRS Toggles</div></div>`;

// Timeline
const maxLap = Math.max(...msgs.map(m => m.Lap || 1));
const lanes = ['Flag','SafetyCar','Other'];
const tl = document.getElementById('timeline');
lanes.forEach((lane, li) => {
  const div = document.createElement('div');
  div.className = 'lane';
  div.innerHTML = `<span class="lane-label">${lane === 'SafetyCar' ? 'SC' : lane}</span>`;
  msgs.filter(m => m.Category === lane).forEach(m => {
    const lap = m.Lap || 1;
    const pct = ((lap - 1) / maxLap) * 100;
    const c = catColor(m);
    const dot = document.createElement('span');
    dot.className = `marker ${c}`;
    dot.style.left = `calc(75px + ${pct * 0.85}%)`;
    dot.title = `L${lap}: ${m.Message}`;
    div.appendChild(dot);
  });
  tl.appendChild(div);
});

// Lap labels
const labels = document.getElementById('lap-labels');
labels.style.marginLeft = '75px';
for (let i = 1; i <= maxLap; i += Math.ceil(maxLap / 15)) {
  const sp = document.createElement('span');
  sp.textContent = `L${i}`;
  labels.appendChild(sp);
}

// Filters
const activeFilter = {cat: 'All'};
const filtersDiv = document.getElementById('filters');
['All',...categories].forEach(c => {
  const btn = document.createElement('button');
  btn.textContent = c;
  if (c === 'All') btn.classList.add('active');
  btn.onclick = () => {
    filtersDiv.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter.cat = c;
    renderFeed();
  };
  filtersDiv.appendChild(btn);
});

function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = activeFilter.cat === 'All' ? msgs : msgs.filter(m => m.Category === activeFilter.cat);
  feed.innerHTML = filtered.map(m => {
    const driver = m.RacingNumber ? extractDriver(m.Message) || m.RacingNumber : extractDriver(m.Message);
    const utc = m.Utc ? m.Utc.split('T')[1] : '';
    return `<div class="msg">
      <div class="meta">L${m.Lap || '?'} · ${utc}</div>
      <span class="badge ${catClass(m.Category)}">${m.Category}${m.Flag ? ' · ' + m.Flag : ''}</span>
      ${driver ? `<span class="driver">${driver}</span>` : ''}
      <span class="text">${m.Message}</span>
    </div>`;
  }).join('');
}
renderFeed();

// Penalties
const penalties = msgs.filter(m => m.Category === 'Penalty' || m.Message.includes('DELETED') || m.Message.includes('FLAG FOR') || m.Message.includes('NOTED') || m.Message.includes('STEWARDS'));
const penDiv = document.getElementById('penalties');
penDiv.innerHTML = penalties.length ? penalties.map(m => {
  const driver = extractDriver(m.Message) || m.RacingNumber || '—';
  return `<div class="item"><span class="pdriver">${driver}</span> <span style="color:#888">L${m.Lap}:</span> ${m.Message}</div>`;
}).join('') : '<div class="item" style="color:#666">No penalties recorded in this race.</div>';
</script>
</body>
