// Clamp throttle/brake to 0-100
const clamp=v=>Math.min(100,Math.max(0,v));
const antT=antThrottle.map(clamp),antB=antBrake.map(clamp);
const piaT=piaThrottle.map(clamp),piaB=piaBrake.map(clamp);

// Scale RPM to realistic range (data 4-8 → map to 3000-12000)
const scaleRPM=v=>{const mn=4,mx=8;return 3000+(v-mn)/(mx-mn)*9000};
const antRPMs=antRPM.map(scaleRPM),piaRPMs=piaRPM.map(scaleRPM);

// Stats
const max=a=>Math.max(...a);

// Find earliest full throttle point (first index where throttle reaches 100 after being <100)
function findEarlyThrottle(throttle,speed){
  let best=-1,bestSpeed=0;
  for(let i=1;i<throttle.length;i++){
    if(throttle[i]>=100&&throttle[i-1]<100){
      if(speed[i]>bestSpeed){bestSpeed=speed[i];best=i;}
    }
  }
  return best;
}

// Find brake application points (where brake goes from 0 to >0 and speed is high)
function findBrakePoints(brake,speed){
  const points=[];
  for(let i=1;i<brake.length;i++){
    if(brake[i]>0&&brake[i-1]===0&&speed[i]>200){
      points.push({i,speed:speed[i]});
    }
  }
  return points;
}

const piaEarlyThrottle=findEarlyThrottle(piaT,piaSpeed);

// --- CANVAS DRAWING ---
const dpr=window.devicePixelRatio||1;

function setupCanvas(id,h){
  const c=document.getElementById(id);
  const w=c.parentElement.clientWidth-32;
  c.style.height=h+'px';
  c.width=w*dpr;c.height=h*dpr;
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  return{ctx,w,h};
}

function drawGrid(ctx,w,h,yMin,yMax,rows,cols,color='#ffffff10'){
  ctx.strokeStyle=color;ctx.lineWidth=1;
  for(let i=0;i<=rows;i++){
    const y=(i/rows)*h;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
  }
  for(let i=0;i<=cols;i++){
    const x=(i/cols)*w;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
  }
}

function drawYLabels(ctx,h,min,max,labels,color='#666'){
  ctx.fillStyle=color;ctx.font='11px system-ui';ctx.textAlign='left';
  labels.forEach((v,i)=>{
    const y=h-(i/(labels.length-1))*h;
    ctx.fillText(v,4,y-3);
  });
}

// Smooth line using cardinal spline
function smoothLine(ctx,points,tension=0.3){
  if(points.length<2)return;
  ctx.moveTo(points[0].x,points[0].y);
  if(points.length===2){ctx.lineTo(points[1].x,points[1].y);return;}
  for(let i=0;i<points.length-1;i++){
    const p0=points[Math.max(0,i-1)];
    const p1=points[i];
    const p2=points[i+1];
    const p3=points[Math.min(points.length-1,i+2)];
    const cp1x=p1.x+(p2.x-p0.x)*tension;
    const cp1y=p1.y+(p2.y-p0.y)*tension;
    const cp2x=p2.x-(p3.x-p1.x)*tension;
    const cp2y=p2.y-(p3.y-p1.y)*tension;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
  }
}

function toPoints(data,w,h,min,max){
  const step=w/(data.length-1);
  return data.map((v,i)=>({x:i*step,y:h-((v-min)/(max-min))*h}));
}

function drawLine(ctx,data,w,h,min,max,color,width=2){
  const pts=toPoints(data,w,h,min,max);
  ctx.beginPath();
  smoothLine(ctx,pts);
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.stroke();
}

function drawArea(ctx,data,w,h,min,max,color,alpha=0.15){
  const pts=toPoints(data,w,h,min,max);
  ctx.beginPath();
  ctx.moveTo(pts[0].x,h);
  ctx.lineTo(pts[0].x,pts[0].y);
  smoothLine(ctx,pts);
  ctx.lineTo(pts[pts.length-1].x,h);
  ctx.closePath();
  ctx.fillStyle=color.replace(')',','+alpha+')').replace('rgb','rgba');
  // Use hex with alpha
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
  ctx.fill();
}

// --- SPEED CHART ---
function drawSpeedChart(){
  const{ctx,w,h}=setupCanvas('speedChart',220);
  drawGrid(ctx,w,h,0,340,6,10);
  drawYLabels(ctx,h,0,340,['340','283','227','170','113','57','0']);
  
  // PIA first (behind)
  drawArea(ctx,piaSpeed,w,h,0,340,PIA.color,0.12);
  drawLine(ctx,piaSpeed,w,h,0,340,PIA.color,2);
  // ANT on top
  drawArea(ctx,antSpeed,w,h,0,340,ANT.color,0.12);
  drawLine(ctx,antSpeed,w,h,0,340,ANT.color,2);
}

// --- THROTTLE/BRAKE CHART ---
function drawTBChart(){
  const{ctx,w,h}=setupCanvas('tbChart',220);
  drawGrid(ctx,w,h,0,100,5,10,'#ffffff08');
  drawYLabels(ctx,h,0,100,['100%','80%','60%','40%','20%','0%']);
  
  // Draw brake as filled areas (red) — inverted to show brake intensity going up
  // Actually: throttle goes UP from bottom, brake goes DOWN from top
  // But for drama, let's do: throttle area from bottom, brake area from top
  
  const step=w/(D.length-1);
  
  // PIA throttle area (green)
  const piaThPts=toPoints(piaT,w,h,0,100);
  ctx.beginPath();ctx.moveTo(0,h);
  piaThPts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(w,h);ctx.closePath();
  ctx.fillStyle='rgba(46,204,113,0.2)';ctx.fill();
  
  // ANT throttle area (green, slightly different shade)
  const antThPts=toPoints(antT,w,h,0,100);
  ctx.beginPath();ctx.moveTo(0,h);
  antThPts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(w,h);ctx.closePath();
  ctx.fillStyle='rgba(46,204,113,0.15)';ctx.fill();
  
  // Brake areas — from top
  const piaBrPts=piaB.map((v,i)=>({x:i*step,y:(v/100)*h}));
  ctx.beginPath();ctx.moveTo(0,0);
  piaBrPts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(w,0);ctx.closePath();
  ctx.fillStyle='rgba(231,76,60,0.25)';ctx.fill();
  
  const antBrPts=antB.map((v,i)=>({x:i*step,y:(v/100)*h}));
  ctx.beginPath();ctx.moveTo(0,0);
  antBrPts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(w,0);ctx.closePath();
  ctx.fillStyle='rgba(231,76,60,0.2)';ctx.fill();
  
  // Lines on top
  drawLine(ctx,piaT,w,h,0,100,'#2ecc71',1.5);
  drawLine(ctx,antT,w,h,0,100,'#27ae60',1.5);
  
  // Brake lines
  const drawBrakeLine=(data,color)=>{
    const pts=data.map((v,i)=>({x:i*step,y:(v/100)*h}));
    ctx.beginPath();smoothLine(ctx,pts);
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  };
  drawBrakeLine(piaB,'#e74c3c');
  drawBrakeLine(antB,'#c0392b');
  
  // Legend
  ctx.font='12px system-ui';
  ctx.fillStyle='#2ecc71';ctx.fillText('■ Throttle',w-200,h-8);
  ctx.fillStyle='#e74c3c';ctx.fillText('■ Brake',w-110,h-8);
}

// --- DRIVER CARDS ---
function renderCards(){
  const el=document.getElementById('driverCards');
  const makeCard=(d,maxSpd,avgSpd,col)=>{
    const c=document.createElement('div');
    c.className=`card ${col}`;
    c.innerHTML=`
      <h3 style="color:${d.color}">${d.abbr} — ${d.name}</h3>
      <div class="team">${d.team} | #${d.n}</div>
      <div class="stat"><span class="label">Max Speed</span><span class="value">${maxSpd} km/h</span></div>
      <div class="stat"><span class="label">Avg Speed</span><span class="value">${avgSpd} km/h</span></div>
    `;
    return c;
  };
  el.appendChild(makeCard(ANT,antMaxSpd,antAvgSpd,'ant'));
  el.appendChild(makeCard(PIA,piaMaxSpd,piaAvgSpd,'pia'));
}

// --- INSIGHT CARD ---
function renderInsight(){
  const el=document.getElementById('insightCard');
  const antBrakeMax=antBrakePts.length?antBrakePts.reduce((a,b)=>a.speed>b.speed?a:b):null;
  const piaBrakeMax=piaBrakePts.length?piaBrakePts.reduce((a,b)=>a.speed>b.speed?a:b):null;
  
  let txt='';
  if(antBrakeMax&&piaBrakeMax){
    if(antBrakeMax.speed>piaBrakeMax.speed){
      txt=`🏁 <strong style="color:${ANT.color}">ANT</strong> brakes later into corners — hitting brakes at <strong>${antBrakeMax.speed} km/h</strong> vs PIA's <strong>${piaBrakeMax.speed} km/h</strong>. That's <strong>${antBrakeMax.speed-piaBrakeMax.speed} km/h</strong> of extra confidence under braking!`;
    }else{
      txt=`🏁 <strong style="color:${PIA.color}">PIA</strong> brakes later into corners — hitting brakes at <strong>${piaBrakeMax.speed} km/h</strong> vs ANT's <strong>${antBrakeMax.speed} km/h</strong>. That's <strong>${piaBrakeMax.speed-antBrakeMax.speed} km/h</strong> of extra confidence under braking!`;
    }
  }else{
    txt='Insufficient brake data for comparison.';
  }
  
  // Add speed advantage
  if(antMaxSpd>piaMaxSpd){
    txt+=`<br><br>⚡ <strong style="color:${ANT.color}">ANT</strong> has the higher top speed: <strong>${antMaxSpd}</strong> km/h vs <strong>${piaMaxSpd}</strong> km/h (+${antMaxSpd-piaMaxSpd} km/h).`;
  }else if(piaMaxSpd>antMaxSpd){
    txt+=`<br><br>⚡ <strong style="color:${PIA.color}">PIA</strong> has the higher top speed: <strong>${piaMaxSpd}</strong> km/h vs <strong>${antMaxSpd}</strong> km/h (+${piaMaxSpd-antMaxSpd} km/h).`;
  }
  
  el.innerHTML=`<h2>🔍 Insights</h2><p>${txt}</p>`;
}

// --- INIT ---
function init(){
  renderCards();
  drawSpeedChart();
  drawTBChart();
  drawRPMChart();
  renderInsight();
}

window.addEventListener('load',init);
window.addEventListener('resize',()=>{init();});
</script>
