<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇯🇵 Japanese Grand Prix 2026 — Weather</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px}
h1{text-align:center;font-size:1.6em;padding:20px 0 10px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:.9em}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1200px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:20px;position:relative;overflow:hidden}
.card h2{font-size:1em;color:#aaa;margin-bottom:12px;font-weight:600}
.card canvas{width:100%!important;height:200px!important}
.stats-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{background:#16213e;border-radius:12px;padding:16px;text-align:center}
.stat-card .label{font-size:.75em;color:#888;text-transform:uppercase;letter-spacing:1px}
.stat-card .value{font-size:1.4em;color:#fff;margin-top:6px;font-weight:700}
.stat-card .range{font-size:.85em;color:#aaa}
.rain-banner{grid-column:1/-1;text-align:center;padding:16px;border-radius:12px;font-size:1.1em;font-weight:600}
.rain-no{background:#1b3a2a;color:#4ade80;border:1px solid #22543d}
.rain-yes{background:#3a1b2a;color:#f87171;border:1px solid #54223a}
.compass-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px}
.compass{width:140px;height:140px;border-radius:50%;border:2px solid #334;position:relative;background:radial-gradient(circle,#1a2744 0%,#16213e 100%)}
.compass-label{position:absolute;font-size:.65em;color:#666;font-weight:700}
.compass-label.n{top:6px;left:50%;transform:translateX(-50%)}
.compass-label.s{bottom:6px;left:50%;transform:translateX(-50%)}
.compass-label.e{right:8px;top:50%;transform:translateY(-50%)}
.compass-label.w{left:8px;top:50%;transform:translateY(-50%)}
.arrow{position:absolute;top:50%;left:50%;width:4px;height:50px;background:linear-gradient(to top,#e74c3c 0%,#e74c3c 50%,#3498db 50%,#3498db 100%);transform-origin:bottom center;border-radius:2px;transform:translate(-50%,-100%) rotate(0deg);transition:transform .5s ease}
.arrow::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #e74c3c}
.compass-info{text-align:center;margin-top:12px}
.compass-info .dir{font-size:1.1em;color:#fff}
.compass-info .spd{font-size:.85em;color:#aaa}
.full{grid-column:1/-1}
@media(max-width:700px){.grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

// Computed stats
const airTemps=DATA.map(d=>d.airTemp), trackTemps=DATA.map(d=>d.trackTemp);
const humidities=DATA.map(d=>d.humidity), pressures=DATA.map(d=>d.pressure);
const windSpeeds=DATA.map(d=>d.windSpeed), windDirs=DATA.map(d=>d.windDir);
const hasRain=DATA.some(d=>d.rainfall===1);

const min=a=>Math.min(...a), max=a=>Math.max(...a), avg=a=>a.reduce((s,v)=>s+v,0)/a.length;
const fmt=v=>v.toFixed(1);

// Stats cards
document.getElementById('stats').innerHTML=`
<div class="stat-card"><div class="label">Air Temp</div><div class="range">${fmt(min(airTemps))}°C → ${fmt(max(airTemps))}°C</div><div class="value">avg ${fmt(avg(airTemps))}°C</div></div>
<div class="stat-card"><div class="label">Track Temp</div><div class="range">${fmt(min(trackTemps))}°C → ${fmt(max(trackTemps))}°C</div><div class="value">avg ${fmt(avg(trackTemps))}°C</div></div>
<div class="stat-card"><div class="label">Max Wind Speed</div><div class="value">${fmt(max(windSpeeds))} m/s</div><div class="range">avg ${fmt(avg(windSpeeds))} m/s</div></div>
<div class="stat-card"><div class="label">Rainfall</div><div class="value">${hasRain?'🌧️ Yes':'☀️ None'}</div><div class="range">Dry session</div></div>`;

// Compass
const avgDir=avg(windDirs);
const dirName=d=>{const n=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return n[Math.round(((d%360+360)%360)/22.5)%16]};
document.getElementById('arrow').style.transform=`translate(-50%,-100%) rotate(${avgDir}deg)`;
document.getElementById('windDir').textContent=`${dirName(avgDir)} (${Math.round(avgDir)}°)`;
document.getElementById('windSpd').textContent=`Avg ${fmt(avg(windSpeeds))} m/s · Max ${fmt(max(windSpeeds))} m/s`;

// Labels
const labels=DATA.map(d=>{const p=d.time.split(':');return p[0]+':'+p[1]});

function drawLine(id,datasets,yMin,yMax,unit){
  const c=document.getElementById(id),ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=c.getBoundingClientRect();
  c.width=rect.width*dpr;c.height=rect.height*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height,pad={t:20,r:60,b:30,l:45};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

  // Grid
  ctx.strokeStyle='#2a2a4a';ctx.lineWidth=1;
  const steps=5;
  for(let i=0;i<=steps;i++){
    const y=pad.t+ch*(i/steps);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='right';
    const val=yMax-(yMax-yMin)*(i/steps);
    ctx.fillText(val.toFixed(1)+unit,W-pad.r+50,y+4);
  }
  // X labels (every 15 min)
  ctx.fillStyle='#666';ctx.textAlign='center';ctx.font='10px sans-serif';
  for(let i=0;i<DATA.length;i+=15){
    const x=pad.l+cw*(i/(DATA.length-1));
    ctx.fillText(labels[i],x,H-5);
  }

  datasets.forEach(ds=>{
    const pts=ds.data.map((v,i)=>({
      x:pad.l+cw*(i/(DATA.length-1)),
      y:pad.t+ch*(1-(v-yMin)/(yMax-yMin))
    }));
    // Fill
    ctx.beginPath();ctx.moveTo(pts[0].x,pad.t+ch);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,pad.t+ch);ctx.closePath();
    ctx.fillStyle=ds.fill;ctx.fill();
    // Line
    ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    ctx.strokeStyle=ds.color;ctx.lineWidth=2;ctx.stroke();
    // Label
    ctx.fillStyle=ds.color;ctx.font='bold 11px sans-serif';ctx.textAlign='left';
    ctx.fillText(ds.label,pad.l+4,pad.t+12+datasets.indexOf(ds)*16);
  });
}

drawLine('tempChart',[
  {data:trackTemps,color:'#ff6b35',fill:'rgba(255,107,53,0.15)',label:'Track Temp'},
  {data:airTemps,color:'#4ecdc4',fill:'rgba(78,205,196,0.15)',label:'Air Temp'}
],Math.floor(min(trackTemps))-2,Math.ceil(max(trackTemps))+2,'°');

drawLine('humChart',[
  {data:humidities,color:'#a855f7',fill:'rgba(168,85,247,0.2)',label:'Humidity'}
],Math.floor(min(humidities))-2,Math.ceil(max(humidities))+2,'%');

drawLine('pressChart',[
  {data:pressures,color:'#38bdf8',fill:'rgba(56,189,248,0.15)',label:'Pressure'}
],Math.floor(min(pressures)*10)/10-0.2,Math.ceil(max(pressures)*10)/10+0.2,' hPa');

window.addEventListener('resize',()=>{

  ],Math.floor(min(trackTemps))-2,Math.ceil(max(trackTemps))+2,'°');
  drawLine('humChart',[
    {data:humidities,color:'#a855f7',fill:'rgba(168,85,247,0.2)',label:'Humidity'}
  ],Math.floor(min(humidities))-2,Math.ceil(max(humidities))+2,'%');
  drawLine('pressChart',[
    {data:pressures,color:'#38bdf8',fill:'rgba(56,189,248,0.15)',label:'Pressure'}
  ],Math.floor(min(pressures)*10)/10-0.2,Math.ceil(max(pressures)*10)/10+0.2,' hPa');
});
