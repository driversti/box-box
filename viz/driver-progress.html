*{margin:0;padding:0;box-sizing:border-box}

h1{text-align:center;font-size:1.5em;margin-bottom:12px;color:#fff}
.c{max-width:1100px;margin:0 auto}

.sum{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:14px}
.sum-l{display:flex;align-items:center;gap:10px}
.sum-c{width:5px;height:55px;border-radius:3px}
.sum-i h2{font-size:1.15em;color:#fff}.sum-i .tm{font-size:.82em;opacity:.65}
.sts{display:flex;gap:14px;flex-wrap:wrap;margin-left:auto}
.st{text-align:center}.st .v{font-size:1.25em;font-weight:700;display:block}.st .l{font-size:.65em;opacity:.55;text-transform:uppercase}
.cg{color:#4caf50}.cr{color:#f44336}.cn{color:#888}
.cw{background:#0f0f23;border-radius:8px;padding:10px;margin-bottom:14px;overflow-x:auto}
canvas{display:block;margin:0 auto}
.tw{max-height:300px;overflow-y:auto;border-radius:8px;background:#0f0f23}
table{width:100%;border-collapse:collapse;font-size:.82em}
th{position:sticky;top:0;background:#16213e;padding:7px 8px;text-align:left;font-weight:600}
td{padding:5px 8px;border-top:1px solid #ffffff0d}tr:hover td{background:#ffffff08}

function ts2s(t){const p=t.split(':');return (+p[0])*3600+(+p[1])*60+parseFloat(p[2])}
function fmt(t){const m=Math.floor(t/60);const s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s}

const grid=document.getElementById('grid');
const det=document.getElementById('det');
const sum=document.getElementById('sum');
const tb=document.getElementById('tb');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

let sel=null;

function buildGrid(){
  grid.innerHTML='';
  C.sorted_nums.forEach(num=>{
    const d=C.drivers[num],fp=C.final_pos[num];
    const el=document.createElement('div');
    el.className='gi'+(sel===num?' on':'');
    el.style.background=d.clr+'22';
    el.innerHTML='<span class="p">P'+fp+'</span><span class="n">'+d.tla+'</span>';
    el.onclick=()=>select(num);
    grid.appendChild(el);
  });
}

function select(num){
  sel=num;det.classList.add('v');
  document.querySelectorAll('.gi').forEach((e,i)=>{
    e.classList.toggle('on',C.sorted_nums[i]===num);
  });
  render(num);
}

function render(num){
  const d=C.drivers[num], entries=C.data[num];
  const start=entries[0].pos, fin=entries[entries.length-1].pos;
  const diff=start-fin;
  const best=Math.min(...entries.map(e=>e.pos));
  const worst=Math.max(...entries.map(e=>e.pos));
  const cls=diff>0?'cg':diff<0?'cr':'cn';
  const arrow=diff>0?'▲'+diff:diff<0?'▼'+Math.abs(diff):'—';

  sum.innerHTML=`<div class="sum-l"><div class="sum-c" style="background:${d.clr}"></div><div class="sum-i"><h2>${d.name}</h2><div class="tm" style="color:${d.clr}">${d.team}</div></div></div>
  <div class="sts">
    <div class="st"><span class="v">P${start} → P${fin}</span><span class="l">Start → Finish</span></div>
    <div class="st"><span class="v ${cls}">${arrow}</span><span class="l">Positions</span></div>
    <div class="st"><span class="v cg">P${best}</span><span class="l">Best</span></div>
    <div class="st"><span class="v cr">P${worst}</span><span class="l">Worst</span></div>
  </div>`;

  // Table
  tb.innerHTML='';
  entries.forEach((e,i)=>{
    const prev=i>0?entries[i-1].pos:e.pos;
    const ch=e.pos-prev;
    const ach=ch<0?'cg':ch>0?'cr':'cn';
    const arr=ch<0?'▲ '+Math.abs(ch):ch>0?'▼ '+ch:'—';
    tb.innerHTML+=`<tr><td>${e.ts}</td><td><b>P${e.pos}</b></td><td class="${ach}">${arr}</td><td>${e.gap||'—'}</td></tr>`;
  });

  // Chart
  const W=Math.max(600,window.innerWidth-80),H=280;
  cv.width=W;cv.height=H;
  const pad={t:20,r:20,b:35,l:40};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const positions=22;

  const times=entries.map(e=>ts2s(e.ts));
  const tMin=times[0],tMax=times[times.length-1];
  const tRange=Math.max(tMax-tMin,1);

  ctx.clearRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle='#ffffff15';ctx.lineWidth=1;
  for(let p=1;p<=22;p++){
    const y=pad.t+((p-1)/21)*ch;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#ffffff55';ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText('P'+p,pad.l-6,y+4);
  }

  // Time labels
  ctx.fillStyle='#ffffff55';ctx.textAlign='center';ctx.font='11px sans-serif';
  const step=Math.max(1,Math.floor(tRange/6));
  for(let t=Math.ceil(tMin/step)*step;t<=tMax;t+=step){
    const x=pad.l+((t-tMin)/tRange)*cw;
    ctx.fillText(fmt(t),x,H-8);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle=d.clr;ctx.lineWidth=2.5;ctx.lineJoin='round';
  entries.forEach((e,i)=>{
    const x=pad.l+((times[i]-tMin)/tRange)*cw;
    const y=pad.t+((e.pos-1)/21)*ch;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Dots
  entries.forEach((e,i)=>{
    const x=pad.l+((times[i]-tMin)/tRange)*cw;
    const y=pad.t+((e.pos-1)/21)*ch;
    const prev=i>0?entries[i-1].pos:e.pos;
    const ch2=e.pos-prev;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=ch2<0?'#4caf50':ch2>0?'#f44336':'#888';
    ctx.fill();ctx.strokeStyle='#0f0f23';ctx.lineWidth=1.5;ctx.stroke();
  });
}

buildGrid();
</script>
